<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Companion for Deafblind Users - Tactile Communication Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="main-header">
            <h1 class="title">AI Companion for Deafblind Users</h1>
            <p class="subtitle">Intelligent Tactile Communication Interface</p>
        </header>
        
        <div class="device">
            <!-- Braille Display Area -->
            <div class="braille-display" id="brailleDisplay">
                <!-- Grid will be generated by JavaScript -->
            </div>
            
            <!-- Control Panel -->
            <div class="control-panel">
                <button class="control-btn mode-btn" id="modeBtn">
                    <span class="btn-icon">M</span>
                    <span class="btn-label">Mode</span>
                </button>
                <button class="control-btn speak-btn" id="speakBtn">
                    <span class="btn-icon">🎤</span>
                    <span class="btn-label">Speak</span>
                </button>
                <button class="control-btn prev-btn" id="prevBtn">
                    <span class="btn-icon">◀</span>
                    <span class="btn-label">Prev</span>
                </button>
                <button class="control-btn next-btn" id="nextBtn">
                    <span class="btn-icon">▶</span>
                    <span class="btn-label">Next</span>
                </button>
            </div>
        </div>
        
        <!-- Status Display -->
        <div class="status-panel">
            <div class="status-item">
                <span class="status-label">Current Mode:</span>
                <span class="status-value" id="currentMode">AI Mode</span>
            </div>
            <div class="status-item">
                <span class="status-label">Display:</span>
                <span class="status-value" id="displayText">Ready...</span>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='braille.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
